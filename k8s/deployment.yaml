apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-pemula-deployment
  labels:
    app: web-pemula
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-pemula
  template:
    metadata:
      labels:
        app: web-pemula
    spec:
      containers:
      - name: nodejs-app
        image: hello-devops:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
